name: Deploy UI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/ui/**'
      - 'packages/shared/**'
      - 'packages/ring-sig/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/heroku-prebuild.sh'
      - '.github/workflows/deploy-ui.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read Node.js version from .nvmrc
        id: nvm
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
          cache: npm

      # ── Rust toolchain + wasm-pack for the ring-sig wasm targets.
      # The UI's `ring-sig-wasm` dep points at a directory that's
      # generated by wasm-pack from Rust source — without this step
      # `tsc -b` fails with "Cannot find module 'ring-sig-wasm'".
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo deps + ring-sig target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/ring-sig/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/ring-sig/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: |
          cargo install wasm-pack --version 0.14.0 --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build ring-sig wasm targets
        run: bash scripts/heroku-prebuild.sh

      - name: Install npm dependencies
        uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb # v1.12.1

      - name: Build project
        run: npm run build
        env:
          VITE_FAUCET_URL: ${{ vars.VITE_FAUCET_URL }}
          VITE_SUBTENSOR_WS: ${{ vars.VITE_SUBTENSOR_WS }}
          VITE_EXPECTED_GENESIS_HASH: ${{ vars.VITE_EXPECTED_GENESIS_HASH }}
          VITE_PROPOSAL_ID: ${{ vars.VITE_PROPOSAL_ID }}
          VITE_PROPOSAL_TITLE: ${{ vars.VITE_PROPOSAL_TITLE }}
          VITE_PROPOSAL_DESCRIPTION: ${{ vars.VITE_PROPOSAL_DESCRIPTION }}
          VITE_PROPOSAL_ALLOWED_VOTERS: ${{ vars.VITE_PROPOSAL_ALLOWED_VOTERS }}
          VITE_PROPOSAL_START_BLOCK: ${{ vars.VITE_PROPOSAL_START_BLOCK }}
          VITE_PROPOSAL_COORDINATOR: ${{ vars.VITE_PROPOSAL_COORDINATOR }}

      - name: Upload production-ready build files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-files
          path: ./packages/ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: production-files
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
