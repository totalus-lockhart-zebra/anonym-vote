name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/ring-sig/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/heroku-prebuild.sh'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read Node.js version from .nvmrc
        id: nvm
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
          cache: npm

      # ── Rust toolchain + wasm-pack so we can build the ring-sig
      # wasm artifacts here, in CI, instead of on Heroku. Doing this
      # in GH Actions has two payoffs:
      #   1. Heroku build slug doesn't need Rust (deploy goes from
      #      ~8 min to ~30 sec — heroku-prebuild.sh skips when the
      #      pre-built artifacts are already present in the tree).
      #   2. We catch a wasm build break in CI before it gets pushed
      #      to Heroku.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo deps + ring-sig target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/ring-sig/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/ring-sig/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: |
          cargo install wasm-pack --version 0.14.0 --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build ring-sig wasm targets
        run: bash scripts/heroku-prebuild.sh

      - name: Install Heroku CLI
        run: npm install -g heroku@11.2.0

      # ── Vendor the freshly-built wasm artifacts into a CI-only
      # commit. This commit lives in this workflow run only — it
      # never gets pushed back to GitHub. We make it so that the
      # subsequent `git push heroku` carries the wasm files in the
      # tree (otherwise they'd be filtered out by .gitignore).
      - name: Vendor ring-sig wasm artifacts into git tree
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add -f packages/ring-sig/wasm/pkg packages/ring-sig/wasm/pkg-bundler
          git commit -m "ci: vendor ring-sig wasm artifacts (deploy)" || \
            echo "no wasm changes to commit"

      - uses: akhileshns/heroku-deploy@581dd286c962b6972d427fcf8980f60755c15520 # v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
