name: Check build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check_build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Read Node.js version from .nvmrc
        id: nvm
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo deps + ring-sig target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/ring-sig/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/ring-sig/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build ring-sig wasm targets
        run: bash scripts/heroku-prebuild.sh

      - name: Install npm dependencies
        run: npm ci

      - name: Check UI format
        run: npm run ui:check-format

      - name: Check API format
        run: npm run api:check-format

      - name: Cargo tests (vendored BLSAG + CLI)
        run: cargo test --manifest-path packages/ring-sig/Cargo.toml

      - name: Vitest
        run: npm test

      - name: Build all packages
        run: npm run build
