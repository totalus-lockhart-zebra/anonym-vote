[package]
name = "ring-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[[bin]]
name = "ring-cli"
path = "src/main.rs"

[dependencies]
stp-crypto = { path = "../vendored/blsag", default-features = false, features = ["std", "signing"] }
curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "rand_core"] }
clap = { version = "=4.4.18", features = ["derive"] }
rand = "0.8"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
